name: Build DigiLuk APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download gradle-wrapper.jar
        run: |
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sL -o android/gradle/wrapper/gradle-wrapper.jar \
              https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar
            echo "Downloaded gradle-wrapper.jar"
            ls -lh android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Create local.properties
        run: |
          FLUTTER_PATH=$(which flutter | xargs dirname | xargs dirname)
          echo "sdk.flutter=$FLUTTER_PATH" > android/local.properties
          echo "flutter.sdk=$FLUTTER_PATH" >> android/local.properties
          echo "Created local.properties with flutter path: $FLUTTER_PATH"

      - name: Get dependencies
        run: flutter pub get

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK to TempServ
        env:
          TEMPSERV_TOKEN: ${{ secrets.TEMPSERV_TOKEN }}
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "Found APK at: $APK_PATH"
          ls -lh "$APK_PATH"
          
          if [ -z "$TEMPSERV_TOKEN" ]; then
            echo "TEMPSERV_TOKEN not set, uploading without auth..."
            RESPONSE=$(curl -s -X POST \
              -F "file=@${APK_PATH}" \
              -F "expiry=24hr" \
              https://tempserv.cmdnode.xyz/api/upload)
          else
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${TEMPSERV_TOKEN}" \
              -F "file=@${APK_PATH}" \
              -F "expiry=24hr" \
              https://tempserv.cmdnode.xyz/api/upload)
          fi
          
          echo "TempServ response: $RESPONSE"
          
          LINK=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url') or d.get('share_url') or d.get('link') or d.get('download_url',''))" 2>/dev/null || echo "")
          
          echo "===APK_LINK=== $LINK"
          
          if [ -z "$LINK" ]; then
            echo "Warning: Could not extract link. Full response:"
            echo "$RESPONSE"
          else
            echo "APK uploaded successfully! Link: $LINK"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: digiluk-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
