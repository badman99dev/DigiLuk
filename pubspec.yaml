  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.1.2
  url_launcher: ^6.2.5
  share_plus: ^8.0.3
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
